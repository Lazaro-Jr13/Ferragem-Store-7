name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Gerar pasta android (sem tocar no resto do projeto)
        run: |
          flutter create --platforms=android --project-name=ferragem_store --org=com.ferragemstore /tmp/scaffold
          cp -r /tmp/scaffold/android ./android

      - name: Instalar dependencias
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: ferragem-store-apk
          path: build/app/outputs/flutter-apk/app-release.apk
